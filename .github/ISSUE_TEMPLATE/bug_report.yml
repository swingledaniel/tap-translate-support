name: Bug report
description: Report a Tap Translate problem without sharing private screenshot text.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Tap Translate.

        Please do not include private screenshots, personal text, API keys, account details, or anything sensitive in a public issue.
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Find this in the app or TestFlight build details if available.
      placeholder: "0.3.0"
  - type: input
    id: ios-version
    attributes:
      label: iOS version
      placeholder: "18.5"
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "iPhone 15 Pro"
  - type: dropdown
    id: area
    attributes:
      label: Problem area
      options:
        - Shortcut setup
        - Screenshot import
        - OCR / text detection
        - Translation overlay
        - Explain
        - Copy or Pleco
        - Settings
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem without including private screenshot content.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Opened...
        2. Triggered Shortcut...
        3. Saw...
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
